# Team360 KubeVela Application Manifest
# Deploys: CNPG PostgreSQL + Go backend + Next.js frontend
# Usage: kubectl apply -f kubevela/teams360-kubevela.yaml
#
# Prerequisites:
#   - KubeVela operator installed (vela-system namespace)
#   - CNPG operator installed (cnpg-system namespace)
#   - CUE definitions applied (vela def apply kubevela/components/*.cue)
#   - Container images available in ghcr.io
#
# Placeholders (substituted by CI/CD pipeline at deploy time):
#   DEPLOY_NAMESPACE — target Kubernetes namespace
#   REPO_OWNER       — GitHub repository owner (lowercase)
#   IMAGE_TAG        — semver tag (e.g., 0.2.0)

apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: teams360
  namespace: DEPLOY_NAMESPACE
spec:
  components:
    # -------------------------------------------------------------------------
    # PostgreSQL via CloudNativePG operator
    # -------------------------------------------------------------------------
    - name: postgres
      type: cloud-native-postgres
      properties:
        name: postgres
        instances: 1
        storageSize: "0.5Gi"
        database: teams360
        owner: teams360

    # -------------------------------------------------------------------------
    # Go/Gin backend API
    # -------------------------------------------------------------------------
    - name: backend
      type: webservice
      properties:
        image: ghcr.io/REPO_OWNER/teams360-api:IMAGE_TAG
        imagePullPolicy: Always
        port: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      traits:
        - type: service-binding
          properties:
            envMappings:
              DATABASE_URL:
                secret: postgres-app
                key: uri
        - type: expose
          properties:
            port:
              - 8080
            type: ClusterIP

    # -------------------------------------------------------------------------
    # Next.js frontend
    # -------------------------------------------------------------------------
    - name: frontend
      type: webservice
      properties:
        image: ghcr.io/REPO_OWNER/teams360-frontend:IMAGE_TAG
        imagePullPolicy: Always
        port: 3000
        env:
          - name: BACKEND_URL
            value: "http://backend:8080"
      traits:
        - type: expose
          properties:
            port:
              - 3000
            type: ClusterIP

  # ---------------------------------------------------------------------------
  # Policies
  # ---------------------------------------------------------------------------
  policies:
    - name: override-dev
      type: override
      properties:
        components:
          - name: backend
            properties:
              replicas: 1
          - name: frontend
            properties:
              replicas: 1

  # ---------------------------------------------------------------------------
  # Workflow — ordered deployment with CNPG readiness wait
  # ---------------------------------------------------------------------------
  workflow:
    steps:
      - name: deploy-database
        type: apply-component
        properties:
          component: postgres

      - name: wait-for-infrastructure
        type: suspend
        properties:
          duration: "45s"
        dependsOn:
          - deploy-database

      - name: deploy-backend
        type: apply-component
        properties:
          component: backend
        dependsOn:
          - wait-for-infrastructure

      - name: deploy-frontend
        type: apply-component
        properties:
          component: frontend
        dependsOn:
          - deploy-backend
