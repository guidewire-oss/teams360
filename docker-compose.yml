# =============================================================================
# Team360 Docker Compose
# Builds and runs the unified image (Go API + static frontend export).
# Database must be provided externally (see docs/DOCKER.md).
# =============================================================================

services:
  teams360:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-guidewire-oss}/teams360:${VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teams360
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PORT: ${PORT:-8080}
      GIN_MODE: ${GIN_MODE:-release}
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start-period: 10s
      retries: 3
    restart: unless-stopped
